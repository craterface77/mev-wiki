[profile.default]
src               = "."          # SandwichBot.huff lives in contracts/ root
auto_detect_solc  = true
optimizer         = true
optimizer_runs    = 200
ffi               = true           # needed for foundry-huff (runs huffc via FFI)
fuzz_runs         = 500
evm_version       = "shanghai"

remappings = [
  "forge-std/=lib/forge-std/src/",
  "foundry-huff/=lib/foundry-huff/src/",
  "v2-core/=lib/v2-core/contracts/",
  "v2-periphery/=lib/v2-periphery/contracts/",
  "v3-core/=lib/v3-core/contracts/",
  "solmate/=lib/solmate/src/",
  # foundry-huff dependency
  "stringutils/=lib/foundry-huff/lib/solidity-stringutils/",
  # v2-periphery internal imports (only needed if you compile v2-periphery router directly)
  "@uniswap/v2-core/=lib/v2-core/",
]

# Skip lib files with solc incompatibilities — we only need their interfaces
skip = [
  "lib/v2-periphery/**",
  "lib/v3-core/contracts/test/**",
  "lib/v3-core/contracts/libraries/**",
  "lib/v3-core/audits/**",
  "lib/solmate/src/test/**",
  "lib/foundry-huff/lib/solidity-stringutils/lib/**",
]


[profile.default.fuzz]
runs = 500
